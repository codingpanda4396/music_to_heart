name: Mirror PostgreSQL to ACR

on:
  workflow_dispatch:

concurrency:
  group: mirror-postgres
  cancel-in-progress: false

permissions:
  contents: read

env:
  POSTGRES_SOURCE: docker.io/library/postgres
  POSTGRES_UPSTREAM_DIGEST: sha256:557fea37a744d5f4c8faab304b0a90858b53ab119735a88c131fd19dab802f36

jobs:
  mirror:
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Copy and verify the immutable manifest
        env:
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        run: |
          set -Eeuo pipefail
          SOURCE="$POSTGRES_SOURCE@$POSTGRES_UPSTREAM_DIGEST"
          TARGET="$ACR_REGISTRY/$ACR_NAMESPACE/qujing-postgres:16.6-bookworm"
          docker buildx imagetools create --tag "$TARGET" "$SOURCE"
          SOURCE_DIGEST=$(docker buildx imagetools inspect "$SOURCE" | awk '/^Digest:/ {print $2; exit}')
          TARGET_DIGEST=$(docker buildx imagetools inspect "$TARGET" | awk '/^Digest:/ {print $2; exit}')
          [[ "$SOURCE_DIGEST" == "$POSTGRES_UPSTREAM_DIGEST" ]]
          [[ "$TARGET_DIGEST" == "$POSTGRES_UPSTREAM_DIGEST" ]]
          printf 'Mirrored PostgreSQL digest: %s\n' "$TARGET_DIGEST"
