name: Build and deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  image:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    environment: production
    outputs:
      digest: ${{ steps.verify.outputs.acr_digest }}
      ghcr_digest: ${{ steps.verify.outputs.ghcr_digest }}
      acr_digest: ${{ steps.verify.outputs.acr_digest }}
      sha: ${{ steps.sha.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ github.event.workflow_run.head_sha }}' }
      - id: sha
        run: echo "value=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          {
            registry: ghcr.io,
            username: '${{ github.actor }}',
            password: '${{ secrets.GITHUB_TOKEN }}',
          }
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            ${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/music-to-heart
          tags: type=raw,value=${{ steps.sha.outputs.value }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - id: verify
        name: Verify registry manifest digests
        env:
          SHA: ${{ steps.sha.outputs.value }}
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        run: |
          set -Eeuo pipefail
          GHCR_REF="ghcr.io/${GITHUB_REPOSITORY,,}:$SHA"
          ACR_REF="$ACR_REGISTRY/$ACR_NAMESPACE/music-to-heart:$SHA"
          GHCR_DIGEST=$(docker buildx imagetools inspect "$GHCR_REF" | awk '/^Digest:/ {print $2; exit}')
          ACR_DIGEST=$(docker buildx imagetools inspect "$ACR_REF" | awk '/^Digest:/ {print $2; exit}')
          [[ "$GHCR_DIGEST" == "$BUILD_DIGEST" ]]
          [[ "$ACR_DIGEST" == "$BUILD_DIGEST" ]]
          echo "ghcr_digest=$GHCR_DIGEST" >> "$GITHUB_OUTPUT"
          echo "acr_digest=$ACR_DIGEST" >> "$GITHUB_OUTPUT"
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.verify.outputs.ghcr_digest }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.verify.outputs.ghcr_digest }}
          push-to-registry: true

  deploy:
    needs: image
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - uses: actions/checkout@v4
        with: { ref: '${{ needs.image.outputs.sha }}' }
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.ECS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Upload release bundle
        env:
          HOST: ${{ secrets.ECS_HOST }}
          USER: ${{ secrets.ECS_USER }}
          SHA: ${{ needs.image.outputs.sha }}
        run: |
          tar -czf "/tmp/$SHA.tgz" infra
          scp "/tmp/$SHA.tgz" "$USER@$HOST:/opt/qujing/releases/$SHA.tgz"
          ssh "$USER@$HOST" "mkdir -p /opt/qujing/releases/$SHA && tar -xzf /opt/qujing/releases/$SHA.tgz -C /opt/qujing/releases/$SHA"
      - name: Blue-green deploy immutable digest
        env:
          HOST: ${{ secrets.ECS_HOST }}
          USER: ${{ secrets.ECS_USER }}
          SHA: ${{ needs.image.outputs.sha }}
          ACR_DIGEST: ${{ needs.image.outputs.acr_digest }}
          ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
          ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}
        run: |
          set -Eeuo pipefail
          IMAGE="$ACR_REGISTRY/$ACR_NAMESPACE/music-to-heart@$ACR_DIGEST"
          ssh "$USER@$HOST" "bash /opt/qujing/releases/$SHA/infra/scripts/deploy.sh '$IMAGE' '$SHA'"
          {
            echo '### Production deployment'
            echo "- Commit: \`$SHA\`"
            echo "- ACR digest: \`$ACR_DIGEST\`"
          } >> "$GITHUB_STEP_SUMMARY"
