name: Build and deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to build and deploy
        required: true

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true')
    runs-on: ubuntu-24.04
    environment: production
    steps:
      - id: sha
        name: Validate immutable commit SHA
        env:
          RAW_SHA: ${{ inputs.sha || github.event.workflow_run.head_sha }}
        run: |
          set -Eeuo pipefail
          [[ "$RAW_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo 'Deployment requires a full lowercase 40-character commit SHA.' >&2
            exit 1
          }
          echo "value=$RAW_SHA" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with: { ref: '${{ steps.sha.outputs.value }}' }
      - uses: docker/setup-buildx-action@v3
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: qujing:${{ steps.sha.outputs.value }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify and scan the production image
        env:
          SHA: ${{ steps.sha.outputs.value }}
        run: |
          set -Eeuo pipefail
          IMAGE_TAG="qujing:$SHA"
          bash infra/scripts/verify-production-image.sh "$IMAGE_TAG"
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: qujing:${{ steps.sha.outputs.value }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - uses: anchore/sbom-action@v0
        with:
          image: qujing:${{ steps.sha.outputs.value }}
          artifact-name: qujing-production.spdx.json
          output-file: /tmp/qujing-production.spdx.json
      - id: archive
        name: Create immutable image archive
        env:
          SHA: ${{ steps.sha.outputs.value }}
        run: |
          set -Eeuo pipefail
          IMAGE_TAG="qujing:$SHA"
          ARCHIVE="qujing-$SHA.tar.gz"
          docker save "$IMAGE_TAG" | gzip -1 > "/tmp/$ARCHIVE"
          (cd /tmp && sha256sum "$ARCHIVE" > "$ARCHIVE.sha256")
          echo "path=/tmp/$ARCHIVE" >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.archive.outputs.path }}
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ECS_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.ECS_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
      - name: Transfer, load, and blue-green deploy
        env:
          HOST: ${{ secrets.ECS_HOST }}
          USER: ${{ secrets.ECS_USER }}
          SHA: ${{ steps.sha.outputs.value }}
        run: |
          set -Eeuo pipefail
          ARCHIVE="qujing-$SHA.tar.gz"
          tar -czf "/tmp/$SHA.tgz" infra
          scp "/tmp/$SHA.tgz" "/tmp/$ARCHIVE" "/tmp/$ARCHIVE.sha256" \
            "$USER@$HOST:/opt/qujing/releases/"
          DEPLOY_OUTPUT=$(ssh "$USER@$HOST" "set -Eeuo pipefail
            mkdir -p '/opt/qujing/releases/$SHA'
            tar -xzf '/opt/qujing/releases/$SHA.tgz' -C '/opt/qujing/releases/$SHA'
            cd /opt/qujing/releases
            sha256sum --check '$ARCHIVE.sha256'
            gzip -dc '$ARCHIVE' | docker load
            IMAGE_ID=\$(docker image inspect --format '{{.Id}}' 'qujing:$SHA')
            rm -f '$ARCHIVE' '$ARCHIVE.sha256'
            bash '/opt/qujing/releases/$SHA/infra/scripts/deploy.sh' \"\$IMAGE_ID\" '$SHA'
            printf 'IMAGE_ID=%s\\n' \"\$IMAGE_ID\"")
          printf '%s\n' "$DEPLOY_OUTPUT"
          IMAGE_ID=$(printf '%s\n' "$DEPLOY_OUTPUT" | awk -F= '/^IMAGE_ID=sha256:/ {print $2; exit}')
          [[ -n "$IMAGE_ID" ]]
          {
            echo '### Production deployment'
            echo "- Commit: \`$SHA\`"
            echo "- Local image ID: \`$IMAGE_ID\`"
          } >> "$GITHUB_STEP_SUMMARY"
