services:
  postgres:
    image: ${POSTGRES_IMAGE:?Set POSTGRES_IMAGE to a digest-qualified ACR image}
    container_name: qujing-postgres
    restart: unless-stopped
    env_file: /etc/qujing/runtime.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - qujing-postgres-data:/var/lib/postgresql/data
    networks: [qujing]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '5' }

networks:
  qujing:
    name: qujing
    external: true

volumes:
  qujing-postgres-data:
    name: qujing-postgres-data
